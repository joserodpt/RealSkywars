name: 📦 Build Minecraft Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Build project
        run: mvn --batch-mode --update-snapshots clean install

      - name: Sanitize branch name
        run: echo "SAFE_REF_NAME=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealSkywars-plugin-${{ env.SAFE_REF_NAME }}
          path: realskywars-plugin/target/RealSkywarsPlugin-*.jar
          if-no-files-found: error

      - name: Publish API to GitHub Packages
        if: github.ref == 'refs/heads/master'
        run: mvn --batch-mode deploy -pl realskywars-api -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
